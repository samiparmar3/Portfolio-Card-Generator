<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pro Card Generator</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <h1>Pro Card Generator</h1>
  <p>Create • Preview • Copy</p>
</header>

<main class="app">

  <section class="panel">
    <div class="tabs">
      <button class="tab active" data-tab="edit">Edit</button>
      <button class="tab" data-tab="code">Code</button>
    </div>

    <div class="tab-content active" id="edit">
      <div class="grid">

        <label>
          <span>Name</span>
          <input type="text" id="name">
        </label>

        <label>
          <span>Role</span>
          <input type="text" id="role">
        </label>

        <label>
          <span>Image URL</span>
          <input type="text" id="image">
        </label>

        <label>
          <span>Upload Image</span>
          <input type="file" id="fileInput" accept="image/*">
        </label>

        <label>
          <span>Primary Color</span>
          <input type="color" id="color" value="#2563eb">
        </label>

        <label>
          <span>Shadow</span>
          <input type="color" id="shadow" value="#000000">
        </label>

        <label>
          <span>Radius</span>
          <input type="range" id="radius" min="8" max="30" value="20">
        </label>

        <label>
          <span>Hover Scale</span>
          <input type="range" id="scale" min="1" max="1.1" step="0.01" value="1.05">
        </label>

      </div>

      <div class="actions">
        <button class="primary" onclick="generate()">Generate</button>
        <button class="ghost" onclick="resetAll()">Reset</button>
      </div>
    </div>

    <div class="tab-content" id="code">
      <pre id="codeBox"></pre>
      <div class="actions">
        <button class="primary" onclick="copyCode()">Copy Code</button>
      </div>
    </div>

  </section>

  <section class="preview-wrap">
    <div class="preview-bg" id="previewBg">
      <div class="card" id="card">

        <div class="img-box">
          <img id="pimg" src="logo.png">
        </div>

        <h3 id="pname">Your Name</h3>
        <p id="prole">Your Role</p>
        <a href="#" id="plink">Follow</a>

      </div>
    </div>
  </section>

</main>

<div id="toast">Copied!</div>


<script src="script.js"></script>
</body>
</html>
